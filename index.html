<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NetGamer MX | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1a1a1a; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        input { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00ffcc; border: none; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>NetGamer MX</h2>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="handleAuth('signup')">Registrarse</button>
        <button onclick="handleAuth('login')" style="background:#555;">Iniciar Sesión</button>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://meiwuluwrdjszxeyoqtt.supabase.co', 
            'sb_publishable_gZgGIamNJqf8ir8vvt1OTw_bJ-rosi4'
        );

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) {
                alert("Por favor, llena ambos campos.");
                return;
            }

            try {
                let result;
                if (type === 'signup') {
                    result = await supabaseClient.auth.signUp({ email, password });
                } else {
                    result = await supabaseClient.auth.signInWithPassword({ email, password });
                }

                if (result.error) throw result.error;
                
                // Como quitamos la confirmación por correo, Supabase inicia sesión automáticamente al registrarse.
                // Así que, sea login o registro, los enviamos directo a las ofertas.
                window.location.href = 'ofertas.html';

            } catch (err) {
                alert("Error: " + err.message);
                console.error("Detalle del error:", err);
            }
        }
    </script>
</body>
</html>
